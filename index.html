<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İK Personel & İzin Yönetimi – Nihai</title>

<style>
:root{
 --bg:#f6f8ff;--card:#ffffff;--text:#0f172a;--muted:#64748b;
 --primary:#2563eb;--accent:#9333ea;--success:#16a34a;--danger:#dc2626;
}
[data-theme="dark"]{
 --bg:#0b1020;--card:#0f172a;--text:#e5e7eb;--muted:#94a3b8;
}
*{box-sizing:border-box;font-family:Inter,Segoe UI,Arial}
body{margin:0;background:var(--bg);color:var(--text)}
header{text-align:center;padding:20px}
h1{margin:0;font-size:26px;font-weight:800}

nav{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
nav button{padding:12px 22px;border:none;border-radius:999px;background:var(--card);cursor:pointer;font-weight:700}
nav button.active{background:linear-gradient(90deg,var(--primary),var(--accent));color:#fff}

section{display:none;max-width:1400px;margin:auto;padding:16px}
section.active{display:block}

.card{background:var(--card);border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 15px 40px rgba(0,0,0,.08)}
label{font-size:13px;color:var(--muted)}
input,select,textarea{width:100%;padding:14px;border-radius:14px;border:1px solid #e5e7eb;margin-top:6px}
textarea{resize:vertical}

button.primary{width:100%;padding:16px;border:none;border-radius:18px;background:linear-gradient(90deg,#16a34a,#22c55e);color:#fff;font-weight:800;cursor:pointer;margin-top:14px}
button.action{padding:10px 18px;border:none;border-radius:999px;background:linear-gradient(90deg,var(--primary),var(--accent));color:#fff;font-weight:700;cursor:pointer}
button.warn{background:linear-gradient(90deg,#f97316,#fb923c)}
button.ghost{padding:8px 16px;border-radius:999px;border:1px solid #e5e7eb;background:var(--card);cursor:pointer}

.search{width:100%;padding:14px;border-radius:14px;border:1px solid #e5e7eb;margin-bottom:12px}

.depts{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px}
.depts button{padding:10px 16px;border:none;border-radius:999px;font-weight:700;color:#fff;white-space:nowrap}

.person{background:var(--card);border-radius:18px;margin-bottom:14px;overflow:hidden}
.person-header{padding:16px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(90deg,#e0e7ff,#fdf4ff)}
.person-body{display:none;padding:16px}
.person.open .person-body{display:block}

.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:14px}
.info{background:#f8fafc;padding:12px;border-radius:14px;font-size:13px}

.table{width:100%;border-collapse:collapse;font-size:12px}
.table th,.table td{padding:6px;border-bottom:1px solid #e5e7eb;text-align:left}

.actions{display:flex;gap:10px;margin:14px 0;flex-wrap:wrap}

.theme{position:fixed;top:12px;right:12px}

.px{color:#dc2626;font-weight:900}
.ph{color:#f59e0b;font-weight:900}
</style>
</head>

<body>

<button class="theme ghost" onclick="toggleTheme()">🌙 / ☀</button>

<header>
<h1>İK PERSONEL & İZİN YÖNETİMİ</h1>
</header>

<nav>
<button class="active" onclick="tab('add',this)">Personel Ekle</button>
<button onclick="tab('list',this)">Personel Listesi</button>
<button onclick="tab('puantaj',this)">Aylık Puantaj</button>
</nav>

<section id="add" class="active">
<div class="card">
<form id="personForm">
<input type="hidden" id="editId">

<label>Ad Soyad</label>
<input id="p_name" required>

<label>İşe Başlama Tarihi</label>
<input type="date" id="p_start" required>

<label>Telefon (+90)</label>
<input id="p_phone" maxlength="10" required>

<label>Brüt Maaş (₺)</label>
<input type="number" id="p_salary" required>

<label>Mevcut Yıllık İzin Hakkı (Gün)</label>
<input type="number" id="p_total" step="0.5" value="14">

<label>Departman</label>
<select id="p_dept">
<option>İK</option>
<option>ÜRETİM</option>
<option>KALİTE</option>
<option>DEPO / SEVKİYAT</option>
<option>MUHASEBE</option>
<option>SATIN ALMA / PAZARLAMA</option>
<option>TEKNİK</option>
</select>

<button class="primary">Kaydet</button>
</form>
</div>
</section>

<section id="list">
<input class="search" placeholder="Personel ara..." onkeyup="search=this.value;render()">
<div class="depts" id="deptBtns"></div>
<div id="listArea"></div>
</section>

<section id="puantaj">
<div class="card" id="puantajPrint">
<h3>Aylık Puantaj</h3>
<label>Ay Seç</label>
<input type="month" id="pMonth" onchange="renderPuantaj()">
<div class="actions">
<button class="action" onclick="window.print()">🖨️ A4 Yatay Yazdır</button>
</div>
<div style="overflow:auto">
<table class="table" id="puantajTable"></table>
</div>
</div>
</section>

<script>
const KEY='HR_FINAL';
let persons=JSON.parse(localStorage.getItem(KEY))||[];
let search='',dept='TÜMÜ';
const DEPTS=['TÜMÜ','İK','ÜRETİM','KALİTE','DEPO / SEVKİYAT','MUHASEBE','SATIN ALMA / PAZARLAMA','TEKNİK'];

function tab(id,btn){
 document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
 btn.classList.add('active');
 if(id==='list')render();
}

function formatDate(d){return new Date(d).toLocaleDateString('tr-TR')}
function formatDay(v){return `${v} gün`}
function remaining(p){
 let used=p.leaves.filter(l=>l.type==='Yıllık').reduce((a,b)=>a+b.days,0);
 return +(p.total-used).toFixed(1);
}
function dayDiff(s,e){return (new Date(e)-new Date(s))/(86400000)+1}

personForm.onsubmit=e=>{
 e.preventDefault();
 let id=editId.value;
 if(id){
  let p=persons.find(x=>x.id==id);
  Object.assign(p,{
   name:p_name.value,
   start:p_start.value,
   phone:'+90'+p_phone.value,
   dept:p_dept.value,
   total:+p_total.value,
   salary:+p_salary.value
  });
 }else{
  persons.push({
   id:Date.now(),
   name:p_name.value,
   start:p_start.value,
   phone:'+90'+p_phone.value,
   dept:p_dept.value,
   total:+p_total.value,
   salary:+p_salary.value,
   leaves:[]
  });
 }
 localStorage.setItem(KEY,JSON.stringify(persons));
 personForm.reset();editId.value='';
 tab('list',document.querySelectorAll('nav button')[1]);
};

function render(){
 deptBtns.innerHTML='';
 DEPTS.forEach(d=>{
  let b=document.createElement('button');
  b.dataset.d=d;b.textContent=d;
  b.onclick=()=>{dept=d;render()};
  deptBtns.appendChild(b);
 });

 listArea.innerHTML='';
 persons
 .filter(p=>p.name.toLowerCase().includes(search.toLowerCase())&&(dept==='TÜMÜ'||p.dept===dept))
 .forEach(p=>{
  let div=document.createElement('div');
  div.className='person';
  div.innerHTML=`
<div class="person-header">
<b>${p.name}</b>
<div class="actions">
<button class="action" onclick="toggle(${p.id})">Detay</button>
<button class="action warn" onclick="editPerson(${p.id})">Güncelle</button>
<button class="ghost" onclick="removeP(${p.id})">Sil</button>
</div>
</div>

<div class="person-body" id="p${p.id}">
<div class="info-grid">
<div class="info"><b>İşe Başlama</b><br>${formatDate(p.start)}</div>
<div class="info"><b>Kalan İzin</b><br>${formatDay(remaining(p))}</div>
</div>

<div class="actions">
<button class="action" onclick="showLeaveForm(${p.id})">İzin Tanımla</button>
<button class="ghost" onclick="printPerson(${p.id})">Yazdır</button>
<button class="ghost" onclick="waPerson(${p.id})">WhatsApp</button>
</div>

<div id="leaveForm${p.id}" style="display:none" class="card">
<label>İzin Türü</label>
<select id="lt${p.id}" onchange="leaveType(${p.id})">
<option>Yıllık</option>
<option>Ücretli</option>
<option>Ücretsiz</option>
<option>Raporlu</option>
<option>Yarım Gün</option>
</select>

<div id="range${p.id}">
<label>Başlangıç</label><input type="date" id="ls${p.id}">
<label>Bitiş</label><input type="date" id="le${p.id}">
</div>

<div id="single${p.id}" style="display:none">
<label>Tarih</label><input type="date" id="lone${p.id}">
</div>

<label>Açıklama</label>
<textarea id="la${p.id}"></textarea>

<button class="primary" onclick="saveLeave(${p.id})">Kaydet</button>
</div>

<table class="table">
<tr><th>Tarih</th><th>Tür</th><th>Gün</th><th>Açıklama</th></tr>
${p.leaves.map(l=>`
<tr>
<td>${l.date}</td>
<td>${l.type}</td>
<td>${formatDay(l.days)}</td>
<td>${l.desc||''}</td>
</tr>`).join('')}
</table>
</div>`;
  listArea.appendChild(div);
 });
}

function toggle(id){document.getElementById('p'+id).parentNode.classList.toggle('open')}
function showLeaveForm(id){document.getElementById('leaveForm'+id).style.display='block'}

function leaveType(id){
 let t=document.getElementById('lt'+id).value;
 document.getElementById('range'+id).style.display=t==='Yarım Gün'?'none':'block';
 document.getElementById('single'+id).style.display=t==='Yarım Gün'?'block':'none';
}

function saveLeave(id){
 let p=persons.find(x=>x.id===id);
 let t=document.getElementById('lt'+id).value;
 let days=0,date='';
 if(t==='Yarım Gün'){
  days=0.5;
  date=formatDate(document.getElementById('lone'+id).value);
 }else{
  let s=document.getElementById('ls'+id).value;
  let e=document.getElementById('le'+id).value;
  days=dayDiff(s,e);
  date=formatDate(s)+' - '+formatDate(e);
 }
 if(t==='Yıllık'&&days>remaining(p))t='Ücretli';
 p.leaves.push({type:t,days,date,desc:document.getElementById('la'+id).value});
 localStorage.setItem(KEY,JSON.stringify(persons));
 render();
}

function editPerson(id){
 let p=persons.find(x=>x.id===id);
 tab('add',document.querySelectorAll('nav button')[0]);
 editId.value=p.id;
 p_name.value=p.name;
 p_start.value=p.start;
 p_phone.value=p.phone.replace('+90','');
 p_total.value=p.total;
 p_salary.value=p.salary||'';
 p_dept.value=p.dept;
}

function printPerson(id){
 let p=persons.find(x=>x.id===id);
 let w=window.open('');
 w.document.write(`<h3>${p.name}</h3><table border=1>
${p.leaves.map(l=>`<tr><td>${l.date}</td><td>${l.type}</td><td>${l.days}</td><td>${l.desc||''}</td></tr>`).join('')}
</table>`);
 w.print();
}

function waPerson(id){
 let p=persons.find(x=>x.id===id);
 let txt=`${p.name}\n`+p.leaves.map(l=>`${l.date} ${l.type} ${l.days}`).join('\n');
 window.open('https://wa.me/?text='+encodeURIComponent(txt));
}

function removeP(id){
 if(confirm('Personel silinsin mi?')){
  persons=persons.filter(p=>p.id!==id);
  localStorage.setItem(KEY,JSON.stringify(persons));
  render();
 }
}

function daysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function renderPuantaj(){
 let v=document.getElementById('pMonth').value;
 if(!v)return;
 let [y,m]=v.split('-').map(Number);m--;
 let days=daysInMonth(y,m);
 let h='<tr><th>Personel</th>';
 for(let i=1;i<=days;i++)h+=`<th>${i}</th>`;
 h+='</tr>';

 let r=persons.map(p=>{
  let row=`<tr><td><b>${p.name}</b></td>`;
  for(let d=1;d<=days;d++){
   let ds=new Date(y,m,d).toLocaleDateString('tr-TR');
   let mark='';
   p.leaves.forEach(l=>{
    if(l.type==='Yarım Gün' && l.date===ds)mark='<span class="ph">◐</span>';
    else if(l.date.includes(ds))mark='<span class="px">✕</span>';
   });
   row+=`<td>${mark}</td>`;
  }
  return row+'</tr>';
 }).join('');
 document.getElementById('puantajTable').innerHTML=h+r;
}

function toggleTheme(){
 document.body.dataset.theme=document.body.dataset.theme==='dark'?'':'dark';
}
</script>

</body>
</html>
